<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite League Season 6 | eFootball Tournament</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode (Default eFootball Theme) */
            --bg-color: #050a18;
            --card-bg: #0d162d;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --primary-neon: #d2ff00; /* eFootball Lime */
            --accent-blue: #0046ff;
            --table-border: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s ease;
        }

        .light-mode {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-dim: #4a5568;
            --primary-neon: #0046ff; /* Blue becomes primary in light mode */
            --accent-blue: #d2ff00;
            --table-border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            transition: var(--transition);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--primary-neon);
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        /* Header */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            text-transform: uppercase;
        }

        .league-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, var(--text-main) 40%, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .season-badge {
            display: inline-block;
            background: var(--primary-neon);
            color: #000;
            padding: 5px 25px;
            font-weight: 800;
            border-radius: 50px;
            font-size: 1.2rem;
            transform: skewX(-15deg);
            margin-bottom: 20px;
        }

        /* Highlights */
        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .highlight-card {
            background: var(--card-bg);
            border-bottom: 3px solid var(--primary-neon);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .highlight-card p {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-neon);
        }

        /* Table */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--table-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: rgba(0,0,0,0.05);
            padding: 20px 15px;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary-neon);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--table-border);
            font-weight: 600;
        }

        .player-link {
            color: var(--primary-neon);
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
        }

        .pts-cell { color: var(--primary-neon); font-size: 1.1rem; }

        /* Button */
        .btn-register {
            display: block;
            width: fit-content;
            margin: 50px auto;
            background: var(--primary-neon);
            color: #000;
            padding: 18px 45px;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(210, 255, 0, 0.2);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(210, 255, 0, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--primary-neon);
            width: 90%; max-width: 400px;
            text-align: center;
            position: relative;
        }

        .close {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5rem; cursor: pointer; color: var(--text-dim);
        }

        .form-dot {
            height: 12px; width: 12px; background: #333;
            display: inline-block; border-radius: 50%; margin: 0 2px;
        }

        @media (max-width: 600px) {
            .league-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" id="themeBtn" title="Toggle Light/Dark Mode">🌓</button>

        <header>
            <div class="season-badge">Season 6</div>
            <h1 class="league-title">ELITE LEAGUE</h1>
            <p style="color: var(--text-dim);">The Ultimate eFootball Championship</p>
        </header>

        <div class="highlights-grid">
            <div class="highlight-card">
                <small>ENTRY FEE</small>
                <p>₹200</p>
            </div>
            <div class="highlight-card">
                <small>FORMAT</small>
                <p>9 MATCHES</p>
            </div>
            <div class="highlight-card">
                <small>PRIZE</small>
                <p>BIG POOL</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>PLAYER</th>
                        <th>P</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GS</th>
                        <th>GC</th>
                        <th>GD</th>
                        <th>PTS</th>
                    </tr>
                </thead>
                <tbody id="leagueTableBody">
                    </tbody>
            </table>
        </div>

        <a href="https://m.me/pesmatches5" target="_blank" class="btn-register">Register Now</a>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalName" style="font-family: 'Orbitron'; color: var(--primary-neon); margin-bottom: 20px;">PLAYER</h2>
            <div style="text-align: left;">
                <div style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid var(--table-border);">
                    <span>Titles Won:</span>
                    <span style="font-weight: 700;">0</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid var(--table-border);">
                    <span>Recent Form:</span>
                    <div>
                        <span class="form-dot"></span><span class="form-dot"></span><span class="form-dot"></span><span class="form-dot"></span><span class="form-dot"></span>
                    </div>
                </div>
                <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.9rem;">No matches played yet in Season 6.</p>
            </div>
        </div>
    </div>

    <script>
        // Dark/Light Mode Toggle
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeBtn.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
        });

        // Table Generation
        const tableBody = document.getElementById('leagueTableBody');
        for (let i = 1; i <= 10; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${i}</td>
                <td><span class="player-link" onclick="openModal('Slot ${i}')">TBD (Slot ${i})</span></td>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
                <td class="pts-cell">0</td>
            `;
            tableBody.appendChild(row);
        }

        // Modal Logic
        const modal = document.getElementById('playerModal');
        const span = document.getElementsByClassName('close')[0];

        function openModal(name) {
            document.getElementById('modalName').innerText = name;
            modal.style.display = "flex";
        }

        span.onclick = () => modal.style.display = "none";
        window.onclick = (event) => {
            if (event.target == modal) modal.style.display = "none";
        }
    </script>
</body>
</html>
