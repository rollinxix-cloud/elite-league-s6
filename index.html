<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite League Season 6 | eFootball Tournament</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --primary-neon: #d2ff00; /* eFootball Lime */
            --secondary-blue: #0046ff;
            --text-white: #ffffff;
            --text-gray: #a0aec0;
            --accent-gradient: linear-gradient(135deg, #0046ff 0%, #d2ff00 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 70, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(210, 255, 0, 0.05) 0%, transparent 40%);
            color: var(--text-white);
            font-family: 'Rajdhani', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header & Hero Section */
        header {
            text-align: center;
            padding: 60px 20px;
            text-transform: uppercase;
        }

        .league-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 40%, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(210, 255, 0, 0.3));
        }

        .season-badge {
            display: inline-block;
            background: var(--primary-neon);
            color: var(--bg-dark);
            padding: 5px 25px;
            font-weight: 800;
            border-radius: 50px;
            font-size: 1.2rem;
            transform: skewX(-15deg);
            margin-bottom: 30px;
        }

        /* Highlights Bar */
        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .highlight-card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary-neon);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .highlight-card:hover {
            transform: translateY(-5deg);
        }

        .highlight-card h3 {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .highlight-card p {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-neon);
        }

        /* League Table Styling */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: rgba(255,255,255,0.03);
            border-bottom: 2px solid var(--primary-neon);
        }

        th {
            padding: 20px 15px;
            text-align: left;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(210, 255, 0, 0.03);
        }

        .player-name {
            color: var(--primary-neon);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-name:hover {
            color: white;
            text-decoration: underline;
        }

        .pos-cell { width: 60px; text-align: center; font-weight: 800; color: var(--text-gray); }
        .pts-cell { font-weight: 800; color: var(--primary-neon); font-size: 1.1rem; }

        /* Form Indicators */
        .form-dot {
            height: 10px;
            width: 10px;
            background: #444;
            display: inline-block;
            border-radius: 50%;
            margin-right: 4px;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--primary-neon);
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-gray);
        }

        .modal-header h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-neon);
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label { color: var(--text-gray); }
        .stat-value { font-weight: 700; color: white; }

        /* CTA Button */
        .btn-register {
            display: block;
            width: fit-content;
            margin: 40px auto;
            background: var(--primary-neon);
            color: var(--bg-dark);
            padding: 15px 40px;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(210, 255, 0, 0.4);
        }

        .btn-register:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(210, 255, 0, 0.6);
        }

        @media (max-width: 600px) {
            .highlights-grid { grid-template-columns: 1fr; }
            .league-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="season-badge">Season 6</div>
            <h1 class="league-title">ELITE LEAGUE</h1>
            <p style="color: var(--text-gray); letter-spacing: 2px;">Professional eFootball Online Tournament</p>
        </header>

        <div class="highlights-grid">
            <div class="highlight-card">
                <h3>ENTRY FEE</h3>
                <p>₹200</p>
            </div>
            <div class="highlight-card">
                <h3>PRIZE POOL</h3>
                <p>BIG PRIZE</p>
            </div>
            <div class="highlight-card">
                <h3>FORMAT</h3>
                <p>Round Robin</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="pos-cell">#</th>
                        <th>PLAYER</th>
                        <th>P</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GS</th>
                        <th>GC</th>
                        <th>GD</th>
                        <th class="pts-cell">PTS</th>
                    </tr>
                </thead>
                <tbody id="league-body">
                    <!-- Table rows injected by JavaScript -->
                </tbody>
            </table>
        </div>

        <a href="#" class="btn-register">Register Now</a>
    </div>

    <!-- Player Info Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <h2 id="modalPlayerName">PLAYER INFO</h2>
            </div>
            <div class="stat-row">
                <span class="stat-label">Previous Elite League Titles</span>
                <span class="stat-value">None (Debut)</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Current Form</span>
                <span class="stat-value">
                    <span class="form-dot"></span>
                    <span class="form-dot"></span>
                    <span class="form-dot"></span>
                    <span class="form-dot"></span>
                    <span class="form-dot"></span>
                </span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Status</span>
                <span class="stat-value" style="color: var(--primary-neon);">Awaiting Kickoff</span>
            </div>
        </div>
    </div>

    <script>
        // Generate 10 Players with default values
        const leagueBody = document.getElementById('league-body');
        const modal = document.getElementById('playerModal');
        const closeModal = document.querySelector('.close-modal');
        const modalName = document.getElementById('modalPlayerName');

        for (let i = 1; i <= 10; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="pos-cell">${i}</td>
                <td><span class="player-name" onclick="showPlayer('Player ${i}')">TBD (Slot ${i})</span></td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td class="pts-cell">0</td>
            `;
            leagueBody.appendChild(tr);
        }

        // Modal Logic
        function showPlayer(name) {
            modalName.innerText = name;
            modal.style.display = 'flex';
        }

        closeModal.onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target == modal) modal.style.display = 'none';
        }
    </script>
</body>
</html>
